<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Saúde Mental</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #eef2ff, #e0f2fe);
    color: #1e293b;
}

/* ANIMAÇÃO DE ENTRADA */
.fade-in {
    opacity: 0;
    transform: translateY(20px);
    animation: fadeIn 0.8s ease forwards;
}

@keyframes fadeIn {
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

header {
    text-align: center;
    padding: 40px 20px;
}

header h1 {
    color: #4f46e5;
}

section {
    max-width: 900px;
    margin: auto;
    padding: 20px;
}

.card {
    background: white;
    border-radius: 16px;
    padding: 25px;
    margin-bottom: 20px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.05);
    transition: transform 0.2s, box-shadow 0.2s;
}

.card:hover {
    transform: translateY(-5px);
    box-shadow: 0 15px 30px rgba(0,0,0,0.08);
}

h2 {
    color: #6366f1;
}

.btn {
    background: linear-gradient(135deg, #6366f1, #38bdf8);
    border: none;
    color: white;
    padding: 12px 20px;
    border-radius: 10px;
    cursor: pointer;
    font-weight: bold;
    margin-top: 10px;
}

canvas {
    margin-top: 20px;
    width: 100%;
    max-width: 100%;
}

footer {
    text-align: center;
    padding: 20px;
    color: #64748b;
}
</style>
</head>

<body>

<header class="fade-in">
    <h1>Monitoramento de Saúde Mental</h1>
    <p>Acompanhamento inteligente do seu bem-estar</p>
</header>

<section>

<div class="card fade-in">
    <h2>Sobre</h2>
    <p>Sistema que analisa padrões emocionais e identifica sinais de risco com inteligência artificial.</p>
</div>

<div class="card fade-in">
    <h2>Simular Humor</h2>
    <button class="btn" onclick="adicionarHumor()">Registrar humor</button>
    <p id="status"></p>
</div>

<div class="card fade-in">
    <h2>Evolução do Humor</h2>
    <canvas id="grafico" height="200"></canvas>
</div>

</section>

<footer>
    Projeto acadêmico
</footer>

<script>
let dados = [];
const canvas = document.getElementById("grafico");
const ctx = canvas.getContext("2d");

function adicionarHumor() {
    const valor = Math.floor(Math.random() * 5) + 1;
    dados.push(valor);

    document.getElementById("status").innerText =
        "Humor registrado: " + valor;

    desenharGrafico();
}

function desenharGrafico() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    const largura = canvas.width;
    const altura = canvas.height;
    const passo = largura / (dados.length + 1);

    ctx.beginPath();
    ctx.strokeStyle = "#6366f1";
    ctx.lineWidth = 3;

    dados.forEach((valor, index) => {
        const x = passo * (index + 1);
        const y = altura - (valor / 5) * altura;

        if (index === 0) {
            ctx.moveTo(x, y);
        } else {
            ctx.lineTo(x, y);
        }

        ctx.fillStyle = "#38bdf8";
        ctx.beginPath();
        ctx.arc(x, y, 4, 0, Math.PI * 2);
        ctx.fill();
    });

    ctx.stroke();
}
</script>

</body>
</html>
